name: Daily Health Short

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu imagemagick
      
      - name: Fix ImageMagick policy for text rendering
        run: sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' /etc/ImageMagick-6/policy.xml
      
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      
      - name: Run video generation pipeline
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python main.py
      
      - uses: actions/upload-artifact@v4
        with:
          name: health-short
          path: health_short.mp4
      
      - name: Commit updated topic tracking
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add used_topics.json
          git commit -m "Update used topics" || echo "No changes"
          git push
